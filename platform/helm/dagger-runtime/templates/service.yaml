apiVersion: v1
kind: Service
metadata:
  name: {{ include "archestra-dagger-runtime.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archestra-dagger-runtime.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "archestra-dagger-runtime.engineSelectorLabels" . | nindent 4 }}
  ports:
    - name: dagger
      port: {{ .Values.service.port }}
      targetPort: dagger
      protocol: TCP
